# Yell Basketball App Schema

# ==================== User ====================
type User @model @auth(rules: [{allow: public}]) {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  bio: String
  location: String
  avatar: String
  coverImage: String
  category: String
  category2: String
  region: String
  regionBlock: String
  prefecture: String
  district: String
  teams: [String]
  isEmailPublic: Boolean
  isRegistrationDatePublic: Boolean
  instagramUrl: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# ==================== Tournament ====================
type Tournament @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String!
  iconUrl: String
  coverImage: String
  category: String
  regionBlock: String
  prefecture: String
  district: String
  tournamentType: String
  area: String
  subArea: String
  description: String
  ownerEmail: String!
  coAdminEmails: [String]
  startDate: AWSDateTime
  endDate: AWSDateTime
  favoritesCount: Int
  isApproved: Boolean!
  instagramUrl: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime

  # リレーションシップ
  teams: [TournamentTeam] @hasMany(indexName: "byTournament", fields: ["id"])
  results: [TournamentResult] @hasMany(indexName: "byTournament", fields: ["id"])
  invitations: [TournamentInvitation] @hasMany(indexName: "byTournament", fields: ["id"])
  posts: [Post] @hasMany(indexName: "byTournament", fields: ["id"])
  favorites: [Favorite] @hasMany(indexName: "byTournament", fields: ["id"])
}

# ==================== Team ====================
type Team @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String!
  shortName: String
  logoUrl: String
  coverImageUrl: String
  founded: String
  region: String
  prefecture: String
  district: String
  headcount: Int
  category: String
  description: String
  website: String
  instagramUrl: String
  ownerEmail: String!
  editorEmails: [String]
  isApproved: Boolean!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime

  # リレーションシップ
  tournamentTeams: [TournamentTeam] @hasMany(indexName: "byTeam", fields: ["id"])
  posts: [Post] @hasMany(indexName: "byTeam", fields: ["id"])
  favorites: [Favorite] @hasMany(indexName: "byTeam", fields: ["id"])
}

# ==================== Post ====================
type Post @model @auth(rules: [{allow: public}]) {
  id: ID!
  content: String!
  imageUrl: String
  videoUrl: String
  videoName: String
  pdfUrl: String
  pdfName: String
  locationName: String
  locationAddress: String
  linkUrl: String
  linkTitle: String
  linkDescription: String
  linkImage: String
  likesCount: Int!
  commentsCount: Int!
  authorEmail: String
  tournamentId: ID @index(name: "byTournament")
  teamId: ID @index(name: "byTeam")
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  comments: [Comment] @hasMany(indexName: "byPost", fields: ["id"])
  tournament: Tournament @belongsTo(fields: ["tournamentId"])
  team: Team @belongsTo(fields: ["teamId"])
}

# ==================== Comment ====================
type Comment @model @auth(rules: [{allow: public}]) {
  id: ID!
  postId: ID! @index(name: "byPost")
  authorEmail: String
  content: String!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  post: Post @belongsTo(fields: ["postId"])
}

# ==================== Like ====================
type Like @model @auth(rules: [{allow: public}]) {
  id: ID!
  postId: ID! @index(name: "byPostAndUser", sortKeyFields: ["userEmail"], queryField: "likesByPostAndUser")
  userEmail: String!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# ==================== Favorite ====================
type Favorite @model @auth(rules: [{allow: public}]) {
  id: ID!
  userEmail: String! @index(name: "byUser", queryField: "favoritesByUser")
  tournamentId: ID @index(name: "byTournament")
  teamId: ID @index(name: "byTeam")
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  tournament: Tournament @belongsTo(fields: ["tournamentId"])
  team: Team @belongsTo(fields: ["teamId"])
}

# ==================== Follow ====================
type Follow @model @auth(rules: [{allow: public}]) {
  id: ID!
  followerEmail: String! @index(name: "byFollower", queryField: "followsByFollower")
  followingEmail: String! @index(name: "byFollowing", queryField: "followsByFollowing")
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# ==================== TournamentTeam ====================
type TournamentTeam @model @auth(rules: [{allow: public}]) {
  id: ID!
  tournamentId: ID! @index(name: "byTournament")
  teamId: ID! @index(name: "byTeam")
  teamName: String
  participationYear: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  tournament: Tournament @belongsTo(fields: ["tournamentId"])
  team: Team @belongsTo(fields: ["teamId"])
}

# ==================== TournamentResult ====================
type TournamentResult @model @auth(rules: [{allow: public}]) {
  id: ID!
  tournamentId: ID! @index(name: "byTournament")
  year: String!
  title: String!
  content: String!
  ranking: [String]
  startDate: AWSDateTime
  endDate: AWSDateTime
  imageUrl: String
  pdfUrl: String
  pdfName: String
  createdBy: String!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  tournament: Tournament @belongsTo(fields: ["tournamentId"])
}

# ==================== TournamentInvitation ====================
type TournamentInvitation @model @auth(rules: [{allow: public}]) {
  id: ID!
  tournamentId: ID! @index(name: "byTournament")
  tournamentName: String!
  inviterEmail: String!
  inviteeEmail: String!
  status: String!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  tournament: Tournament @belongsTo(fields: ["tournamentId"])
}

# ==================== ChatThread ====================
# 大会運営者からチームへのオファーチャットスレッド
type ChatThread @model @auth(rules: [{allow: public}]) {
  id: ID!
  # 送信者情報（大会運営者）
  senderEmail: String! @index(name: "bySender", queryField: "chatThreadsBySender")
  senderName: String!
  # 受信チーム情報
  teamId: ID! @index(name: "byTeam", queryField: "chatThreadsByTeam")
  teamName: String!
  # 大会情報
  tournamentId: ID! @index(name: "byTournament", queryField: "chatThreadsByTournament")
  tournamentName: String!
  # スレッドのタイプ（offer: 大会参加オファー）
  threadType: String!
  # ステータス（pending: 確認待ち, accepted: 承認, rejected: 辞退）
  status: String!
  # 最新メッセージ情報（一覧表示用）
  lastMessage: String
  lastMessageAt: AWSDateTime
  # 未読カウント（チーム運営者側）
  teamUnreadCount: Int
  # 未読カウント（大会運営者側）
  senderUnreadCount: Int
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# ==================== ChatMessage ====================
# チャットスレッド内の個別メッセージ
type ChatMessage @model @auth(rules: [{allow: public}]) {
  id: ID!
  threadId: ID! @index(name: "byThread", sortKeyFields: ["createdAt"])
  senderEmail: String!
  senderName: String!
  content: String!
  # メッセージタイプ（text: テキスト, image: 画像, video: 動画, pdf: PDF, system: システムメッセージ）
  messageType: String!
  # メディア添付（画像・動画・PDF）
  imageUrl: String
  videoUrl: String
  pdfUrl: String
  pdfName: String
  isRead: Boolean
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# ==================== Notification ====================
# チーム運営者やユーザーへの通知
type Notification @model @auth(rules: [{allow: public}]) {
  id: ID!
  recipientEmail: String! @index(name: "byRecipient", sortKeyFields: ["createdAt"], queryField: "notificationsByRecipient")
  type: String!
  title: String!
  message: String!
  senderName: String
  senderAvatar: String
  relatedId: String
  relatedType: String
  isRead: Boolean!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# ==================== Region ====================
type Region @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String!
  slug: String! @index(name: "bySlug", queryField: "regionBySlug")
  sortOrder: Int!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  prefectures: [Prefecture] @hasMany(indexName: "byRegion", fields: ["id"])
}

# ==================== Prefecture ====================
type Prefecture @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String!
  slug: String! @index(name: "bySlug", queryField: "prefectureBySlug")
  regionId: ID! @index(name: "byRegion", sortKeyFields: ["sortOrder"])
  sortOrder: Int!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  region: Region @belongsTo(fields: ["regionId"])
  districts: [District] @hasMany(indexName: "byPrefecture", fields: ["id"])
}

# ==================== District ====================
type District @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String!
  prefectureId: ID! @index(name: "byPrefecture", sortKeyFields: ["sortOrder"])
  sortOrder: Int!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  
  # リレーションシップ
  prefecture: Prefecture @belongsTo(fields: ["prefectureId"])
}

# ==================== SiteConfig ====================
# YeLL全体の設定（スポンサーバナーなど）
type SiteConfig @model @auth(rules: [{allow: public}]) {
  id: ID!
  configKey: String! @index(name: "byConfigKey", queryField: "siteConfigByKey")
  configValue: String!
  updatedBy: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# ==================== PushSubscription ====================
# Web Pushプッシュ通知の購読情報
type PushSubscription @model @auth(rules: [{allow: public}]) {
  id: ID!
  userEmail: String! @index(name: "byUser", queryField: "pushSubscriptionsByUser")
  endpoint: String!
  p256dh: String!
  auth: String!
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}
